<!DOCTYPE html>
<html>
<head>
    <title>All Frames Tags Example</title>
</head>
<frameset rows="20%,80%" border="5">

    <frame src="top.html" name="topFrame" scrolling="no" noresize>

    <frameset cols="25%,75%">

        <frame src="menu.html" name="menuFrame">

        <frame src="home.html" name="contentFrame">

    </frameset>

    <noframes>
        <body>
            <h2>Your browser does not support frames.</h2>
        </body>
    </noframes>

</frameset>

</html>
