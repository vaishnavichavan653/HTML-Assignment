    <h2>Employee Registration Form</h2>

    <form>
        <label>Full Name:</label><br>
        <input type="text" name="name"><br><br>

        <label>Email:</label><br>
        <input type="email" name="email"><br><br>

        <label>Password:</label><br>
        <input type="password" name="password"><br><br>

        <label>Phone Number:</label><br>
        <input type="tel" name="phone"><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender"> Male<br>
        <input type="radio" name="gender"> Female<br>
        <input type="radio" name="gender"> Other<br><br>

        <label>Department:</label><br>
        <select name="department">
            <option>Select</option>
            <option>HR</option>
            <option>IT</option>
            <option>Finance</option>
            <option>Marketing</option>
        </select><br><br>

        <label>Skills:</label><br>
        <input type="checkbox" name="skills"> Java<br>
        <input type="checkbox" name="skills"> Python<br>
        <input type="checkbox" name="skills"> Web Development<br><br>

        <label>Address:</label><br>
        <textarea name="address" rows="4" cols="30"></textarea><br><br>

        <label>Date of Joining:</label><br>
        <input type="date" name="doj"><br><br>
        
        <input type="submit" value="Register">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
